allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

// Force all library subprojects (e.g. isar_flutter_libs which has compileSdkVersion 30)
// to compile against SDK 36, and assign a namespace if missing (required by AGP 8+).
// afterEvaluate is safe here because we've removed evaluationDependsOn(":app").
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                compileSdkVersion 36
                if (namespace == null) {
                    namespace project.group
                }
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}