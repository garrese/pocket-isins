flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/app_icon.png"
    background_color: "#12121D"
    theme_color: "#64FFDA"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/app_icon.png"
